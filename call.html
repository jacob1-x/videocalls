<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GeoRun Call + Extras</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 10px 20px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      margin: 0;
      font-size: 20px;
    }
    main {
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
      gap: 10px;
    }
    section {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      flex: 1 1 300px;
      min-width: 280px;
    }
    video {
      width: 100%;
      max-height: 240px;
      background: #222;
    }
    #remote-videos video {
      width: 48%;
      margin: 1%;
    }
    .btn {
      padding: 8px 16px;
      margin: 4px;
      background: #0af;
      color: #000;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      border: none;
    }
    input, textarea {
      width: 100%;
      margin: 4px 0;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #000;
      color: #fff;
      font-size: 13px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }
    li {
      margin: 2px 0;
    }
    .small {
      font-size: 12px;
      color: #aaa;
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      background: #222;
      margin-left: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>

<header>
  <h1>GeoRun Call + Extras</h1>
  <div>
    <button class="btn" id="joinBtn">Join Call</button>
    <button class="btn" id="leaveBtn">Leave</button>
    <span id="modeLabel" class="small"></span>
  </div>
</header>

<main>
  <section>
    <h2>Local</h2>
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="small" id="roomInfo"></div>
  </section>

  <section>
    <h2>Remote</h2>
    <div id="remote-videos"></div>
  </section>

  <section>
    <h2>Presence</h2>
    <ul id="users-list"></ul>
    <div class="small" id="limitInfo"></div>
  </section>

  <section>
    <h2>File sharing</h2>
    <input id="fileName" placeholder="File name or label">
    <textarea id="fileUrl" rows="2" placeholder="Link or description"></textarea>
    <button class="btn" id="sendFileBtn">Share</button>
    <ul id="filesList"></ul>
  </section>

  <section>
    <h2>Polling</h2>
    <input id="pollQuestion" placeholder="Poll question">
    <input id="pollOptions" placeholder="Options (comma separated)">
    <button class="btn" id="createPollBtn">Create poll</button>
    <div id="polls"></div>
  </section>
</main>

<script type="module">
  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import {
    getDatabase, ref, push, set, onChildAdded, onValue,
    onDisconnect, serverTimestamp, update
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  // --- ROOM + USER ---
  const params = new URLSearchParams(location.search);
  let roomId = params.get("room");
  if (!roomId) {
    roomId = "room-" + Math.random().toString(36).slice(2);
    location.search = "?room=" + roomId;
  }

  let userId = sessionStorage.getItem("userId");
  if (!userId) {
    userId = "user-" + Math.random().toString(36).slice(2);
    sessionStorage.setItem("userId", userId);
  }

  document.getElementById("roomInfo").textContent =
    `Room: ${roomId} | You: ${userId}`;

  const firebaseConfig = {
    apiKey: "AIzaSyADjsNLnBm2i4_UtcBd34M0QixU75eUxwo",
    authDomain: "georun-web.firebaseapp.com",
    databaseURL: "https://georun-web-default-rtdb.firebaseio.com",
    projectId: "georun-web",
    storageBucket: "georun-web.firebasestorage.app",
    messagingSenderId: "772176051586",
    appId: "1:772176051586:web:80a73f1c0ca4529ac5639b",
    measurementId: "G-QNXQZD5FYL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const localVideo = document.getElementById("localVideo");
  const remoteContainer = document.getElementById("remote-videos");
  const usersListEl = document.getElementById("users-list");
  const limitInfo = document.getElementById("limitInfo");
  const modeLabel = document.getElementById("modeLabel");

  const pcConfig = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  };

  let localStream = null;
  let joined = false;
  let users = [];
  const peers = {};      // remoteId -> RTCPeerConnection
  const remoteVideos = {}; // remoteId -> video element

  async function initLocalMedia() {
    if (localStream) return;
    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });
    localVideo.srcObject = localStream;
  }

  // --- PRESENCE ---
  const userRef = ref(db, `rooms/${roomId}/users/${userId}`);
  set(userRef, { joinedAt: serverTimestamp() });
  onDisconnect(userRef).remove();

  onValue(ref(db, `rooms/${roomId}/users`), snapshot => {
    const val = snapshot.val() || {};
    users = Object.keys(val).sort();
    usersListEl.innerHTML = "";
    users.forEach(uid => {
      const li = document.createElement("li");
      li.textContent = uid === userId ? `${uid} (you)` : uid;
      usersListEl.appendChild(li);
    });

    const count = users.length;
    if (count <= 3) {
      modeLabel.textContent = "Mode: Mesh (up to 3 callers)";
      limitInfo.textContent = "";
    } else {
      modeLabel.textContent = "Mode: Room full (4+ not active yet)";
      limitInfo.textContent = "This room supports up to 3 active callers. Extra users can still use chat/files/polls.";
    }
  });

  // --- SIGNALING ---
  function sendSignal(payload) {
    const sigRef = push(ref(db, `rooms/${roomId}/signals`));
    set(sigRef, {
      from: userId,
      ts: serverTimestamp(),
      ...payload
    });
  }

  onChildAdded(ref(db, `rooms/${roomId}/signals`), async (snapshot) => {
    const sig = snapshot.val();
    if (!sig || sig.from === userId) return;
    if (sig.to && sig.to !== userId) return;

    const { type, from, sdp, candidate } = sig;

    if (type === "offer") {
      if (!joined) return;
      let pc = peers[from];
      if (!pc) pc = createPeer(from);
      await pc.setRemoteDescription(new RTCSessionDescription(sdp));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendSignal({ type: "answer", to: from, sdp: answer });
    } else if (type === "answer") {
      const pc = peers[from];
      if (!pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    } else if (type === "candidate") {
      const pc = peers[from];
      if (!pc || !candidate) return;
      try {
        await pc.addIceCandidate(candidate);
      } catch (e) {
        console.error("addIceCandidate error", e);
      }
    }
  });

  function createPeer(remoteId) {
    const pc = new RTCPeerConnection(pcConfig);
    peers[remoteId] = pc;

    if (localStream) {
      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
      });
    }

    pc.onicecandidate = (event) => {
      if (!event.candidate) return;
      sendSignal({
        type: "candidate",
        to: remoteId,
        candidate: event.candidate.toJSON()
      });
    };

    pc.ontrack = (event) => {
      let v = remoteVideos[remoteId];
      if (!v) {
        v = document.createElement("video");
        v.autoplay = true;
        v.playsInline = true;
        remoteVideos[remoteId] = v;
        remoteContainer.appendChild(v);
      }
      const [stream] = event.streams;
      v.srcObject = stream;
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === "failed" || pc.connectionState === "disconnected" || pc.connectionState === "closed") {
        if (remoteVideos[remoteId]) {
          remoteVideos[remoteId].remove();
          delete remoteVideos[remoteId];
        }
        delete peers[remoteId];
      }
    };

    return pc;
  }

  async function startMesh() {
    await initLocalMedia();
    joined = true;

    const activeUsers = users.filter(u => u !== userId);
    if (users.length > 3) {
      // Do not start new connections if more than 3 users
      return;
    }

    for (const remoteId of activeUsers) {
      if (peers[remoteId]) continue;
      // simple rule: only the lexicographically smaller id initiates
      if (userId < remoteId) {
        const pc = createPeer(remoteId);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignal({ type: "offer", to: remoteId, sdp: offer });
      }
    }
  }

  function leaveCall() {
    joined = false;
    Object.values(peers).forEach(pc => pc.close());
    Object.keys(peers).forEach(k => delete peers[k]);
    Object.values(remoteVideos).forEach(v => v.remove());
    Object.keys(remoteVideos).forEach(k => delete remoteVideos[k]);
  }

  document.getElementById("joinBtn").onclick = () => {
    startMesh().catch(console.error);
  };
  document.getElementById("leaveBtn").onclick = () => {
    leaveCall();
  };

  // --- FILE SHARING ---
  const fileNameInput = document.getElementById("fileName");
  const fileUrlInput = document.getElementById("fileUrl");
  const filesList = document.getElementById("filesList");

  document.getElementById("sendFileBtn").onclick = () => {
    const name = fileNameInput.value.trim();
    const url = fileUrlInput.value.trim();
    if (!name && !url) return;
    const fileRef = push(ref(db, `rooms/${roomId}/files`));
    set(fileRef, {
      from: userId,
      name,
      url,
      ts: serverTimestamp()
    });
    fileNameInput.value = "";
    fileUrlInput.value = "";
  };

  onChildAdded(ref(db, `rooms/${roomId}/files`), snapshot => {
    const val = snapshot.val();
    const li = document.createElement("li");
    const label = val.name || "(no name)";
    const text = val.url ? ` – ${val.url}` : "";
    li.textContent = `${val.from}: ${label}${text}`;
    filesList.appendChild(li);
  });

  // --- POLLING ---
  const pollQuestionInput = document.getElementById("pollQuestion");
  const pollOptionsInput = document.getElementById("pollOptions");
  const pollsDiv = document.getElementById("polls");

  document.getElementById("createPollBtn").onclick = () => {
    const q = pollQuestionInput.value.trim();
    const opts = pollOptionsInput.value.split(",").map(o => o.trim()).filter(Boolean);
    if (!q || opts.length === 0) return;
    const pollRef = push(ref(db, `rooms/${roomId}/polls`));
    set(pollRef, {
      question: q,
      options: opts,
      ts: serverTimestamp()
    });
    pollQuestionInput.value = "";
    pollOptionsInput.value = "";
  };

  onValue(ref(db, `rooms/${roomId}/polls`), snapshot => {
    const polls = snapshot.val() || {};
    pollsDiv.innerHTML = "";
    Object.entries(polls).forEach(([pollId, poll]) => {
      const wrapper = document.createElement("div");
      wrapper.style.borderTop = "1px solid #333";
      wrapper.style.paddingTop = "6px";
      const q = document.createElement("div");
      q.textContent = poll.question;
      q.style.fontWeight = "bold";
      wrapper.appendChild(q);

      const opts = poll.options || [];
      const votes = poll.votes || {};
      opts.forEach((opt, idx) => {
        const count = Object.values(votes).filter(v => v === idx).length;
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.style.fontSize = "12px";
        btn.textContent = `${opt} (${count})`;
        btn.onclick = () => {
          const voteRef = ref(db, `rooms/${roomId}/polls/${pollId}/votes/${userId}`);
          set(voteRef, idx);
        };
        wrapper.appendChild(btn);
      });

      pollsDiv.appendChild(wrapper);
    });
  });

  // start local preview
  initLocalMedia().catch(console.error);
</script>

</body>
</html>
