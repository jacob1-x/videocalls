<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GeoRun Ring v5</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    video, canvas {
      width: 45%;
      margin: 10px;
      background: #222;
    }
    .btn {
      padding: 12px 25px;
      margin: 10px;
      background: #0af;
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      border: none;
    }
    #users-panel {
      margin-top: 20px;
      text-align: left;
      display: inline-block;
      background: #111;
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }
    #users-panel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    #users-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 14px;
    }
    #users-list li {
      margin: 2px 0;
    }
  </style>
</head>
<body>

  <h1>GeoRun Ring v5</h1>

  <div>
    <video id="local" autoplay muted playsinline></video>
    <canvas id="mixed" width="320" height="240"></canvas>
  </div>

  <div>
    <button class="btn" onclick="startRing()">Join Ring</button>
    <button class="btn" onclick="hangup()">Hang Up</button>
  </div>

  <div id="users-panel">
    <h3>Connected users (ring order)</h3>
    <ul id="users-list"></ul>
  </div>

<script type="module">
  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import {
    getDatabase, ref, push, set, onChildAdded, onValue,
    onDisconnect, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  // --- URL-BASED ROOM ID ---
  const params = new URLSearchParams(location.search);
  let roomId = params.get("room");
  if (!roomId) {
    roomId = "room-" + Math.random().toString(36).slice(2);
    location.search = "?room=" + roomId;
  }

  // --- STABLE USER ID ---
  let userId = sessionStorage.getItem("userId");
  if (!userId) {
    userId = "user-" + Math.random().toString(36).slice(2);
    sessionStorage.setItem("userId", userId);
  }

  console.log("v5: roomId =", roomId, "userId =", userId);

  const firebaseConfig = {
    apiKey: "AIzaSyADjsNLnBm2i4_UtcBd34M0QixU75eUxwo",
    authDomain: "georun-web.firebaseapp.com",
    databaseURL: "https://georun-web-default-rtdb.firebaseio.com",
    projectId: "georun-web",
    storageBucket: "georun-web.firebasestorage.app",
    messagingSenderId: "772176051586",
    appId: "1:772176051586:web:80a73f1c0ca4529ac5639b",
    measurementId: "G-QNXQZD5FYL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const localVideo = document.getElementById("local");
  const mixedCanvas = document.getElementById("mixed");
  const mixedCtx = mixedCanvas.getContext("2d");
  const usersListEl = document.getElementById("users-list");

  // Offscreen video for incoming stream
  const incomingVideo = document.createElement("video");
  incomingVideo.autoplay = true;
  incomingVideo.playsInline = true;

  const pcConfig = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  };

  let localStream = null;
  let pcIn = null;   // from previous user
  let pcOut = null;  // to next user
  let ringUsers = [];
  let prevId = null;
  let nextId = null;
  let ringStarted = false;

  async function initLocalMedia() {
    if (localStream) return;
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    localVideo.srcObject = localStream;
  }

  // --- PRESENCE / RING ORDER ---
  const usersRef = ref(db, `rooms/${roomId}/users/${userId}`);
  set(usersRef, { joinedAt: serverTimestamp() });
  onDisconnect(usersRef).remove();

  onValue(ref(db, `rooms/${roomId}/users`), snapshot => {
    const users = snapshot.val() || {};
    ringUsers = Object.keys(users).sort(); // simple deterministic order
    usersListEl.innerHTML = "";
    ringUsers.forEach(uid => {
      const li = document.createElement("li");
      li.textContent = uid === userId ? `${uid} (you)` : uid;
      usersListEl.appendChild(li);
    });
    computeNeighbors();
  });

  function computeNeighbors() {
    const idx = ringUsers.indexOf(userId);
    if (idx === -1 || ringUsers.length < 2) {
      prevId = null;
      nextId = null;
      return;
    }
    const n = ringUsers.length;
    prevId = ringUsers[(idx - 1 + n) % n];
    nextId = ringUsers[(idx + 1) % n];
    console.log("v5: neighbors prev =", prevId, "next =", nextId);
  }

  // --- SIGNALING ---
  function sendSignal(payload) {
    const sigRef = push(ref(db, `rooms/${roomId}/signals`));
    set(sigRef, {
      from: userId,
      ts: serverTimestamp(),
      ...payload
    });
  }

  onChildAdded(ref(db, `rooms/${roomId}/signals`), async (snapshot) => {
    const sig = snapshot.val();
    if (!sig || sig.from === userId) return;

    // Only handle messages addressed to us
    if (sig.to && sig.to !== userId) return;

    console.log("v5: signal for me:", sig.type, "link:", sig.link);

    if (sig.type === "offer" && sig.link === "in") {
      // Incoming from previous user
      if (!pcIn) createIncomingPC();
      await pcIn.setRemoteDescription(new RTCSessionDescription(sig.sdp));
      const answer = await pcIn.createAnswer();
      await pcIn.setLocalDescription(answer);
      sendSignal({
        type: "answer",
        link: "in",
        to: sig.from,
        sdp: answer
      });
    } else if (sig.type === "answer" && sig.link === "out") {
      // Answer from next user
      if (!pcOut) return;
      await pcOut.setRemoteDescription(new RTCSessionDescription(sig.sdp));
    } else if (sig.type === "candidate") {
      if (sig.link === "in" && pcIn) {
        try { await pcIn.addIceCandidate(sig.candidate); } catch (e) { console.error(e); }
      } else if (sig.link === "out" && pcOut) {
        try { await pcOut.addIceCandidate(sig.candidate); } catch (e) { console.error(e); }
      }
    }
  });

  // --- PEER CONNECTIONS ---
  function createIncomingPC() {
    pcIn = new RTCPeerConnection(pcConfig);
    pcIn.ontrack = (event) => {
      console.log("v5: incoming ontrack");
      const [stream] = event.streams;
      incomingVideo.srcObject = stream;
      startMixLoop();
    };
    pcIn.onicecandidate = (event) => {
      if (!event.candidate) return;
      sendSignal({
        type: "candidate",
        link: "in",
        to: prevId,
        candidate: event.candidate.toJSON()
      });
    };
  }

  function createOutgoingPC(mixedStream) {
    pcOut = new RTCPeerConnection(pcConfig);
    for (const track of mixedStream.getTracks()) {
      pcOut.addTrack(track, mixedStream);
    }
    pcOut.onicecandidate = (event) => {
      if (!event.candidate) return;
      sendSignal({
        type: "candidate",
        link: "out",
        to: nextId,
        candidate: event.candidate.toJSON()
      });
    };
  }

  // --- MIXING LOOP: incoming + local → mixedCanvas → captureStream ---
  let mixLoopStarted = false;
  let mixedStream = null;

  function startMixLoop() {
    if (mixLoopStarted) return;
    mixLoopStarted = true;

    function draw() {
      const w = 320;
      const h = 240;
      mixedCanvas.width = w;
      mixedCanvas.height = h;

      mixedCtx.fillStyle = "black";
      mixedCtx.fillRect(0, 0, w, h);

      // Draw incoming stream if available
      if (incomingVideo.readyState >= 2) {
        mixedCtx.drawImage(incomingVideo, 0, 0, w, h);
      }

      // Overlay local camera in corner
      if (localVideo.readyState >= 2) {
        const lw = w / 4;
        const lh = h / 4;
        mixedCtx.drawImage(localVideo, w - lw - 10, h - lh - 10, lw, lh);
      }

      // Simple label
      mixedCtx.fillStyle = "rgba(0,255,255,0.8)";
      mixedCtx.font = "14px Arial";
      mixedCtx.fillText(userId, 10, 20);

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);

    // Capture mixed stream for outgoing PC
    mixedStream = mixedCanvas.captureStream(20);
    if (nextId) {
      createOutgoingPC(mixedStream);
      createAndSendOfferToNext();
    }
  }

  async function createAndSendOfferToNext() {
    if (!pcOut || !nextId) return;
    const offer = await pcOut.createOffer();
    await pcOut.setLocalDescription(offer);
    sendSignal({
      type: "offer",
      link: "out",
      to: nextId,
      sdp: offer
    });
  }

  // --- PUBLIC BUTTONS ---
  window.startRing = async () => {
    console.log("v5: startRing");
    await initLocalMedia();
    ringStarted = true;

    // If we have a previous user, we expect an offer from them (pcIn created on demand)
    // If we have a next user, we will send them an offer once mixedStream exists
    if (!prevId && ringUsers.length > 1) {
      // If we're the first in sorted order, we bootstrap the ring by sending
      // a blank incoming stream (just our local) to next.
      console.log("v5: bootstrapping ring as first user");
      // No incoming yet, but we can still start mix loop with only local
      startMixLoop();
    }
  };

  window.hangup = () => {
    console.log("v5: hangup");
    ringStarted = false;
    if (pcIn) { pcIn.close(); pcIn = null; }
    if (pcOut) { pcOut.close(); pcOut = null; }
  };

  // Start local preview immediately
  initLocalMedia().catch(err => {
    console.error("v5: getUserMedia failed", err);
  });
</script>

</body>
</html>
