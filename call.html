<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GeoRun Video Call v3.4</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    video, img {
      width: 45%;
      margin: 10px;
      background: #222;
    }
    .btn {
      padding: 12px 25px;
      margin: 10px;
      background: #0af;
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      border: none;
    }
    #hvideo-icon {
      width: 64px;
      height: 64px;
      margin: 10px auto 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      animation: hvideaPulse 1.2s infinite alternate;
      background: #111;
      border: 2px solid #0af;
      color: #0af;
    }
    @keyframes hvideaPulse {
      0% {
        box-shadow: 0 0 4px #0af, 0 0 8px #0af;
        transform: scale(1);
      }
      100% {
        box-shadow: 0 0 12px #0ff, 0 0 24px #0ff;
        transform: scale(1.08);
      }
    }
  </style>
</head>
<body>

  <h1>GeoRun Video Caller v3.4</h1>

  <div id="hvideo-icon">HVIDEA</div>

  <div>
    <video id="local" autoplay muted playsinline></video>
    <img id="remote" alt="Remote cipher video">
  </div>

  <div>
    <button class="btn" onclick="startCall()">Call</button>
    <button class="btn" onclick="answerCall()">Answer</button>
    <button class="btn" onclick="hangup()">Hang Up</button>
  </div>

<script type="module">
  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";

  import {
    getDatabase, ref, push, set, onChildAdded, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyADjsNLnBm2i4_UtcBd34M0QixU75eUxwo",
    authDomain: "georun-web.firebaseapp.com",
    databaseURL: "https://georun-web-default-rtdb.firebaseio.com",
    projectId: "georun-web",
    storageBucket: "georun-web.firebasestorage.app",
    messagingSenderId: "772176051586",
    appId: "1:772176051586:web:80a73f1c0ca4529ac5639b",
    measurementId: "G-QNXQZD5FYL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const roomId = "test-room";
  const userId = "user-" + Math.random().toString(36).slice(2);

  const localVideo = document.getElementById("local");
  const remoteImg = document.getElementById("remote");

  // 8,192 cipher characters per frame
  function encodeFrameToKeyBits(b64Frame) {
    return b64Frame.slice(0, 8192);
  }

  // key_bits → HVIDEA-style draw calls
  function keyBitsToDrawCalls(key_bits, width, height) {
    const calls = [];

    for (let i = 0; i < key_bits.length; i++) {
      const kb = key_bits.charCodeAt(i);

      const wrapped = kb % 255;

      const bin = kb.toString(2);
      let ones = 0, zeros = 0;
      for (const bit of bin) {
        if (bit === '1') ones++;
        else if (bit === '0') zeros++;
      }
      const sumBits = ones + zeros;

      const x = (wrapped * 3 + sumBits * 7) % width;
      const y = (wrapped * 5 + sumBits * 11) % height;

      const r = (wrapped * sumBits) % 256;
      const g = (wrapped * 13) % 256;
      const b = (sumBits * 17) % 256;

      const cmd = `:x${x}y${y}:${r},${g},${b}:`;
      calls.push(cmd);
    }

    return calls;
  }

  // Render draw calls to a JPEG data URL
  function renderDrawCalls(calls, width, height) {
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, width, height);

    for (const cmd of calls) {
      const match = cmd.match(/:x(\d+)y(\d+):(\d+),(\d+),(\d+):/);
      if (!match) continue;

      const x = parseInt(match[1]);
      const y = parseInt(match[2]);
      const r = parseInt(match[3]);
      const g = parseInt(match[4]);
      const b = parseInt(match[5]);

      ctx.fillStyle = `rgb(${r},${g},${b})`;

      const size = 12;
      const dx = Math.min(x, width - size);
      const dy = Math.min(y, height - size);

      ctx.fillRect(dx, dy, size, size);
    }

    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, width, height);

    return canvas.toDataURL("image/jpeg", 0.5).split(",")[1];
  }

  function reconstructFrameFromKeyBits(key_bits) {
    const width = 320;
    const height = 240;
    const calls = keyBitsToDrawCalls(key_bits, width, height);
    return renderDrawCalls(calls, width, height);
  }

  let keyBitsBuffer = [];

  function startSending() {
    console.log("v3.4: startSending called");

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    setInterval(() => {
      if (!localVideo.videoWidth || !localVideo.videoHeight) return;

      canvas.width = localVideo.videoWidth;
      canvas.height = localVideo.videoHeight;
      ctx.drawImage(localVideo, 0, 0);

      const jpeg = canvas.toDataURL("image/jpeg", 0.4);
      const b64 = jpeg.split(",")[1];
      if (!b64) return;

      const key_bits = encodeFrameToKeyBits(b64);
      keyBitsBuffer.push(key_bits);
    }, 200);

    setInterval(() => {
      if (keyBitsBuffer.length === 0) return;

      const batchRef = push(ref(db, `rooms/${roomId}/cipher_batches`));
      const payload = {
        from: userId,
        key_bits_batch: keyBitsBuffer,
        ts: serverTimestamp()
      };
      console.log("v3.4: sending batch", payload);
      set(batchRef, payload);

      keyBitsBuffer = [];
    }, 1000);
  }

  navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    .then(stream => {
      localVideo.srcObject = stream;
      localVideo.onloadedmetadata = () => {
        console.log("v3.4: camera ready, starting sender");
        startSending();
      };
    })
    .catch(err => {
      console.error("v3.4: getUserMedia failed", err);
    });

  onChildAdded(ref(db, `rooms/${roomId}/cipher_batches`), snapshot => {
    const batch = snapshot.val();
    if (!batch || batch.from === userId) return;

    console.log("v3.4: received batch", batch);

    for (const key_bits of batch.key_bits_batch) {
      const reconstructed = reconstructFrameFromKeyBits(key_bits);
      if (reconstructed) {
        remoteImg.src = "data:image/jpeg;base64," + reconstructed;
      }
    }
  });

  function sendSignal(type) {
    const sigRef = push(ref(db, `rooms/${roomId}/signals`));
    set(sigRef, {
      from: userId,
      type,
      ts: serverTimestamp()
    });
  }

  window.startCall = () => sendSignal("call");
  window.answerCall = () => sendSignal("answer");
  window.hangup = () => sendSignal("hangup");

  onChildAdded(ref(db, `rooms/${roomId}/signals`), snapshot => {
    const sig = snapshot.val();
    if (!sig || sig.from === userId) return;
    console.log("Signal from other user:", sig.type);
  });
</script>

</body>
</html>
