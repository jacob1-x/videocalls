<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GeoRun Video Caller v4</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    video, canvas {
      width: 45%;
      margin: 10px;
      background: #222;
    }
    .btn {
      padding: 12px 25px;
      margin: 10px;
      background: #0af;
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      border: none;
    }
    #hvideo-icon {
      width: 64px;
      height: 64px;
      margin: 10px auto 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      animation: hvideaPulse 1.2s infinite alternate;
      background: #111;
      border: 2px solid #0af;
      color: #0af;
    }
    @keyframes hvideaPulse {
      0% {
        box-shadow: 0 0 4px #0af, 0 0 8px #0af;
        transform: scale(1);
      }
      100% {
        box-shadow: 0 0 12px #0ff, 0 0 24px #0ff;
        transform: scale(1.08);
      }
    }
    #users-panel {
      margin-top: 20px;
      text-align: left;
      display: inline-block;
      background: #111;
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }
    #users-panel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    #users-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 14px;
    }
    #users-list li {
      margin: 2px 0;
    }
  </style>
</head>
<body>

  <h1>GeoRun Video Caller v4</h1>

  <div id="hvideo-icon">HVIDEA</div>

  <div>
    <video id="local" autoplay muted playsinline></video>
    <canvas id="remote" width="320" height="240"></canvas>
  </div>

  <div>
    <button class="btn" onclick="startCall()">Call</button>
    <button class="btn" onclick="answerCall()">Answer</button>
    <button class="btn" onclick="hangup()">Hang Up</button>
  </div>

  <div id="users-panel">
    <h3>Connected users</h3>
    <ul id="users-list"></ul>
  </div>

<script type="module">
  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import {
    getDatabase, ref, push, set, onChildAdded, onValue,
    onDisconnect, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  // --- URL-BASED ROOM ID ---
  const params = new URLSearchParams(location.search);
  let roomId = params.get("room");
  if (!roomId) {
    roomId = "room-" + Math.random().toString(36).slice(2);
    location.search = "?room=" + roomId;
  }

  // --- STABLE SENDER ID PER TAB ---
  let userId = sessionStorage.getItem("userId");
  if (!userId) {
    userId = "user-" + Math.random().toString(36).slice(2);
    sessionStorage.setItem("userId", userId);
  }

  console.log("v4: roomId =", roomId, "userId =", userId);

  const firebaseConfig = {
    apiKey: "AIzaSyADjsNLnBm2i4_UtcBd34M0QixU75eUxwo",
    authDomain: "georun-web.firebaseapp.com",
    databaseURL: "https://georun-web-default-rtdb.firebaseio.com",
    projectId: "georun-web",
    storageBucket: "georun-web.firebasestorage.app",
    messagingSenderId: "772176051586",
    appId: "1:772176051586:web:80a73f1c0ca4529ac5639b",
    measurementId: "G-QNXQZD5FYL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const localVideo = document.getElementById("local");
  const remoteCanvas = document.getElementById("remote");
  const remoteCtx = remoteCanvas.getContext("2d");
  const usersListEl = document.getElementById("users-list");

  // Offscreen video for remote stream → drawn into canvas
  const remoteVideo = document.createElement("video");
  remoteVideo.autoplay = true;
  remoteVideo.playsInline = true;

  // --- WEBRTC CONFIG ---
  const pcConfig = {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  };

  let pc = null;       // video PC
  let pcAudio = null;  // audio PC
  let localStream = null;
  let audioStream = null;

  // --- LOCAL MEDIA ---
  async function initLocalMedia() {
    if (localStream) return;
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    localVideo.srcObject = localStream;
  }

  async function initAudio() {
    if (audioStream) return;
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  }

  // --- PEER CONNECTIONS ---
  function createPeerConnection() {
    pc = new RTCPeerConnection(pcConfig);

    if (localStream) {
      for (const track of localStream.getTracks()) {
        pc.addTrack(track, localStream);
      }
    }

    pc.ontrack = (event) => {
      console.log("v4: video ontrack", event.streams);
      const [stream] = event.streams;
      remoteVideo.srcObject = stream;
      startRemoteCanvasLoop();
    };

    pc.onicecandidate = (event) => {
      if (!event.candidate) return;
      sendSignal({
        type: "candidate",
        candidate: event.candidate.toJSON()
      });
    };
  }

  function createAudioPeerConnection() {
    pcAudio = new RTCPeerConnection(pcConfig);

    if (audioStream) {
      for (const track of audioStream.getTracks()) {
        pcAudio.addTrack(track, audioStream);
      }
    }

    pcAudio.ontrack = (event) => {
      console.log("v4: audio ontrack", event.streams);
      const [stream] = event.streams;
      const audioEl = new Audio();
      audioEl.autoplay = true;
      audioEl.srcObject = stream;
    };

    pcAudio.onicecandidate = (event) => {
      if (!event.candidate) return;
      sendSignal({
        type: "candidate-audio",
        candidate: event.candidate.toJSON()
      });
    };
  }

  function startRemoteCanvasLoop() {
    function draw() {
      if (remoteVideo.readyState >= 2) {
        const w = remoteVideo.videoWidth || 320;
        const h = remoteVideo.videoHeight || 240;
        remoteCanvas.width = w;
        remoteCanvas.height = h;
        remoteCtx.drawImage(remoteVideo, 0, 0, w, h);
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  }

  // --- SIGNALING HELPERS ---
  function sendSignal(payload) {
    const sigRef = push(ref(db, `rooms/${roomId}/signals`));
    set(sigRef, {
      from: userId,
      ts: serverTimestamp(),
      ...payload
    });
  }

  // --- CALL / ANSWER / HANGUP ---
  window.startCall = async () => {
    console.log("v4: startCall");
    await initLocalMedia();
    await initAudio();

    createPeerConnection();
    createAudioPeerConnection();

    const offerVideo = await pc.createOffer();
    await pc.setLocalDescription(offerVideo);

    const offerAudio = await pcAudio.createOffer();
    await pcAudio.setLocalDescription(offerAudio);

    sendSignal({
      type: "call",
      sdpVideo: offerVideo,
      sdpAudio: offerAudio
    });
  };

  window.answerCall = async () => {
    console.log("v4: answerCall");
    await initLocalMedia();
    await initAudio();

    createPeerConnection();
    createAudioPeerConnection();
    // We wait for "call" in the signal listener
  };

  window.hangup = () => {
    console.log("v4: hangup");
    if (pc) {
      pc.close();
      pc = null;
    }
    if (pcAudio) {
      pcAudio.close();
      pcAudio = null;
    }
  };

  // --- SIGNAL LISTENER ---
  onChildAdded(ref(db, `rooms/${roomId}/signals`), async (snapshot) => {
    const sig = snapshot.val();
    if (!sig || sig.from === userId) return;

    console.log("v4: signal from other user:", sig.type);

    if (sig.type === "call") {
      // We are callee
      if (!pc) {
        await initLocalMedia();
        createPeerConnection();
      }
      if (!pcAudio) {
        await initAudio();
        createAudioPeerConnection();
      }

      if (sig.sdpVideo) {
        const remoteDescVideo = new RTCSessionDescription(sig.sdpVideo);
        await pc.setRemoteDescription(remoteDescVideo);
        const answerVideo = await pc.createAnswer();
        await pc.setLocalDescription(answerVideo);

        if (sig.sdpAudio && pcAudio) {
          const remoteDescAudio = new RTCSessionDescription(sig.sdpAudio);
          await pcAudio.setRemoteDescription(remoteDescAudio);
          const answerAudio = await pcAudio.createAnswer();
          await pcAudio.setLocalDescription(answerAudio);

          sendSignal({
            type: "answer",
            sdpVideo: answerVideo,
            sdpAudio: answerAudio
          });
        } else {
          sendSignal({
            type: "answer",
            sdpVideo: answerVideo
          });
        }
      }

    } else if (sig.type === "answer") {
      // We are caller
      if (pc && sig.sdpVideo) {
        const remoteDescVideo = new RTCSessionDescription(sig.sdpVideo);
        await pc.setRemoteDescription(remoteDescVideo);
      }
      if (pcAudio && sig.sdpAudio) {
        const remoteDescAudio = new RTCSessionDescription(sig.sdpAudio);
        await pcAudio.setRemoteDescription(remoteDescAudio);
      }

    } else if (sig.type === "candidate") {
      if (pc && sig.candidate) {
        try {
          await pc.addIceCandidate(sig.candidate);
        } catch (e) {
          console.error("v4: addIceCandidate (video) error", e);
        }
      }
    } else if (sig.type === "candidate-audio") {
      if (pcAudio && sig.candidate) {
        try {
          await pcAudio.addIceCandidate(sig.candidate);
        } catch (e) {
          console.error("v4: addIceCandidate (audio) error", e);
        }
      }
    }
  });

  // --- PRESENCE: WHO'S CONNECTED ---
  const usersRef = ref(db, `rooms/${roomId}/users/${userId}`);
  set(usersRef, {
    joinedAt: serverTimestamp()
  });
  onDisconnect(usersRef).remove();

  onValue(ref(db, `rooms/${roomId}/users`), snapshot => {
    const users = snapshot.val() || {};
    usersListEl.innerHTML = "";
    Object.keys(users).forEach(uid => {
      const li = document.createElement("li");
      li.textContent = uid === userId ? `${uid} (you)` : uid;
      usersListEl.appendChild(li);
    });
  });

  // Start local preview immediately
  initLocalMedia().catch(err => {
    console.error("v4: getUserMedia (video) failed", err);
  });
</script>

</body>
</html>
