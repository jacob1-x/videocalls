<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GeoRun Video Call v3</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }
    video {
      width: 45%;
      margin: 10px;
      background: #222;
    }
    .btn {
      padding: 12px 25px;
      margin: 10px;
      background: #0af;
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>GeoRun Video Caller v3</h1>

  <div>
    <video id="local" autoplay muted></video>
    <video id="remote" autoplay></video>
  </div>

  <div>
    <button class="btn" onclick="startCall()">Call</button>
    <button class="btn" onclick="answerCall()">Answer</button>
    <button class="btn" onclick="hangup()">Hang Up</button>
  </div>

<script type="module">
  /* ---------------------------------------------------------
     1. Firebase Imports
  --------------------------------------------------------- */
  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";

  import {
    getDatabase, ref, push, set, onChildAdded, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  /* ---------------------------------------------------------
     2. Firebase Config
  --------------------------------------------------------- */
  const firebaseConfig = {
    apiKey: "AIzaSyADjsNLnBm2i4_UtcBd34M0QixU75eUxwo",
    authDomain: "georun-web.firebaseapp.com",
    databaseURL: "https://georun-web-default-rtdb.firebaseio.com",
    projectId: "georun-web",
    storageBucket: "georun-web.firebasestorage.app",
    messagingSenderId: "772176051586",
    appId: "1:772176051586:web:80a73f1c0ca4529ac5639b",
    measurementId: "G-QNXQZD5FYL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  /* ---------------------------------------------------------
     3. Room + User
  --------------------------------------------------------- */
  const roomId = "test-room";
  const userId = "user-" + Math.random().toString(36).slice(2);

  const localVideo = document.getElementById("local");
  const remoteVideo = document.getElementById("remote");

  /* ---------------------------------------------------------
     4. Cipher Encoding (extract key_bits)
  --------------------------------------------------------- */
  function encodeFrameToKeyBits(b64Frame) {
    // Take first 128 chars as key_bits (adjustable)
    return b64Frame.slice(0, 128);
  }

  /* ---------------------------------------------------------
     5. Cipher Reconstruction (v3 math)
     pixel = ((kb % 255) * (count of 1s + 0s)) % 256
  --------------------------------------------------------- */
  function reconstructFrameFromKeyBits(key_bits) {
    const width = 320;
    const height = 240;

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");

    const imgData = ctx.createImageData(width, height);
    const data = imgData.data;

    for (let i = 0; i < width * height; i++) {

      // Pick a key_bits character for this pixel
      const kb = key_bits.charCodeAt(i % key_bits.length);

      // Step 1: wrap around 255
      const wrapped = kb % 255;

      // Step 2: convert to binary
      const bin = kb.toString(2);

      // Step 3: count 1s and 0s
      let ones = 0;
      let zeros = 0;
      for (const bit of bin) {
        if (bit === '1') ones++;
        else if (bit === '0') zeros++;
      }
      const sumBits = ones + zeros;

      // Step 4: multiply and wrap into 0–255
      const v = (wrapped * sumBits) % 256;

      // Step 5: write pixel (grayscale)
      data[i * 4 + 0] = v;
      data[i * 4 + 1] = v;
      data[i * 4 + 2] = v;
      data[i * 4 + 3] = 255;
    }

    ctx.putImageData(imgData, 0, 0);

    return canvas.toDataURL("image/jpeg", 0.5).split(",")[1];
  }

  /* ---------------------------------------------------------
     6. Start Camera
  --------------------------------------------------------- */
  navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    .then(stream => {
      localVideo.srcObject = stream;
      startSending(stream);
    });

  /* ---------------------------------------------------------
     7. Batched Sending
  --------------------------------------------------------- */
  let keyBitsBuffer = [];

  function startSending(stream) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // Capture frames
    setInterval(() => {
      canvas.width = localVideo.videoWidth || 320;
      canvas.height = localVideo.videoHeight || 240;
      ctx.drawImage(localVideo, 0, 0);

      const jpeg = canvas.toDataURL("image/jpeg", 0.4);
      const b64 = jpeg.split(",")[1];

      const key_bits = encodeFrameToKeyBits(b64);
      keyBitsBuffer.push(key_bits);
    }, 200); // ~5 FPS capture

    // Send batches
    setInterval(() => {
      if (keyBitsBuffer.length === 0) return;

      const batchRef = push(ref(db, `rooms/${roomId}/cipher_batches`));
      set(batchRef, {
        from: userId,
        key_bits_batch: keyBitsBuffer,
        ts: serverTimestamp()
      });

      keyBitsBuffer = [];
    }, 1000); // send 1 batch/sec
  }

  /* ---------------------------------------------------------
     8. Receive Batches
  --------------------------------------------------------- */
  onChildAdded(ref(db, `rooms/${roomId}/cipher_batches`), snapshot => {
    const batch = snapshot.val();
    if (!batch || batch.from === userId) return;

    for (const key_bits of batch.key_bits_batch) {
      const reconstructed = reconstructFrameFromKeyBits(key_bits);
      if (reconstructed) {
        remoteVideo.src = "data:image/jpeg;base64," + reconstructed;
      }
    }
  });

  /* ---------------------------------------------------------
     9. Signaling
  --------------------------------------------------------- */
  function sendSignal(type) {
    const sigRef = push(ref(db, `rooms/${roomId}/signals`));
    set(sigRef, {
      from: userId,
      type,
      ts: serverTimestamp()
    });
  }

  window.startCall = () => sendSignal("call");
  window.answerCall = () => sendSignal("answer");
  window.hangup = () => sendSignal("hangup");

  onChildAdded(ref(db, `rooms/${roomId}/signals`), snapshot => {
    const sig = snapshot.val();
    if (!sig || sig.from === userId) return;
    console.log("Signal from other user:", sig.type);
  });

</script>

</body>
</html>
